  <style>
    :root, .sw-root {
      --sw-bg: #cfe0d8;                 /* casa com o fundo das cenas */
      --sw-ink: #241d38;
      --sw-ink-soft: #5f5878;
      --sw-accent: #6d4fb0;
      --sw-font-display: "Bricolage Grotesque", system-ui, sans-serif;
      --sw-font-body: "Nunito", system-ui, sans-serif;
    }

    /* Tipografia editorial (padrão da loja) */
    .sw-copy__title {
      font-weight: 800 !important;
      letter-spacing: -0.015em !important;
    }
    .sw-copy__eyebrow { font-weight: 800 !important; letter-spacing: 0.2em !important; }
    .sw-brand__name { font-family: var(--sw-font-display); font-weight: 800; font-size: 1.15rem; letter-spacing: -0.01em; }

    /* LEGIBILIDADE: scrim mais forte atrás da copy */
    .sw-copylayer::before {
      width: min(64vw, 880px) !important;
      background: linear-gradient(90deg,
        var(--sw-bg) 0%,
        color-mix(in srgb, var(--sw-bg) 92%, transparent) 30%,
        color-mix(in srgb, var(--sw-bg) 55%, transparent) 62%,
        transparent 100%) !important;
    }
    .sw-copy__title {
      text-shadow: 0 0 28px rgba(207, 224, 216, 0.95), 0 1px 2px rgba(36, 29, 56, 0.12) !important;
    }
    .sw-copy__body {
      color: var(--sw-ink) !important;
      font-weight: 600;
      text-shadow: 0 0 18px rgba(207, 224, 216, 0.98) !important;
    }
    @media (max-width: 720px) {
      .sw-copylayer::before {
        width: 100% !important;
        background: linear-gradient(0deg,
          var(--sw-bg) 14%,
          color-mix(in srgb, var(--sw-bg) 82%, transparent) 52%,
          transparent 100%) !important;
      }
    }

    /* Hint com pílula legível sobre qualquer cena */
    .sw-hint {
      color: var(--sw-ink) !important;
      font-weight: 800;
      background: color-mix(in srgb, #fff 85%, transparent);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      padding: 10px 18px 12px;
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--sw-ink) 12%, transparent);
    }
    .sw-hint i { border-color: color-mix(in srgb, var(--sw-ink) 45%, transparent) !important; }

    /* Botões no padrão da loja */
    .sw-btn--primary:hover { background: var(--sw-accent) !important; }
    .sw-topcta:hover { background: var(--sw-accent); }

    noscript .ns-scene { max-width: 900px; margin: 0 auto 48px; padding: 0 20px; text-align: center; }
    noscript .ns-scene img { max-width: 100%; border-radius: 16px; }
    noscript h2 { font-family: var(--sw-font-display); color: var(--sw-ink); }
